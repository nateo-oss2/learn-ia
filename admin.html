<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin - CodeLab</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f2f4f7;
      color: #1e2229;
      padding: 32px 24px;
    }
    h1 { font-size: 1.6rem; margin-bottom: 24px; }
    .tabs { display: flex; gap: 8px; margin-bottom: 20px; }
    .tab {
      padding: 10px 20px;
      border: 1px solid #e6e9ef;
      border-radius: 8px;
      background: #f9fafc;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.9rem;
      transition: background 0.15s;
    }
    .tab:hover { background: #edf0f4; }
    .tab.active { background: #5279f0; color: #fff; border-color: #5279f0; }
    .panel { display: none; }
    .panel.active { display: block; }
    table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,0.04);
      font-size: 0.82rem;
    }
    th, td { padding: 10px 14px; text-align: left; border-bottom: 1px solid #eef1f5; }
    th {
      background: #f8fafc;
      font-weight: 600;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      color: #8e96a6;
    }
    tr:hover td { background: #f8fafc; }
    .empty { color: #8e96a6; padding: 40px 0; text-align: center; }
    .error {
      color: #d6453d;
      background: #fef2f2;
      padding: 14px 18px;
      border-radius: 8px;
      margin-bottom: 16px;
      font-weight: 500;
      font-size: 0.9rem;
    }
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 0.72rem;
      font-weight: 600;
    }
    .badge-enter { background: #dcfce7; color: #166534; }
    .badge-exit  { background: #fef3c7; color: #92400e; }
    .badge-heartbeat { background: #dbeafe; color: #1e40af; }
    td { max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    @media (max-width: 600px) {
      body { padding: 16px; }
      table { font-size: 0.72rem; }
      th, td { padding: 6px 8px; }
    }
  </style>
</head>
<body>
  <h1>👋 Admin — CodeLab</h1>
  <div class="tabs">
    <button class="tab active" data-tab="visits">Visites</button>
    <button class="tab" data-tab="users">Utilisateurs</button>
  </div>
  <div id="error" class="error" style="display:none"></div>
  <div id="panel-visits" class="panel active"></div>
  <div id="panel-users" class="panel"></div>

  <script>
    const panels = { visits: document.getElementById("panel-visits"), users: document.getElementById("panel-users") };

    document.querySelectorAll(".tab").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
        btn.classList.add("active");
        Object.entries(panels).forEach(([k, el]) => el.classList.toggle("active", k === btn.dataset.tab));
      });
    });

    function showError(msg) {
      const el = document.getElementById("error");
      el.textContent = msg;
      el.style.display = "block";
    }

    async function load() {
      try {
        const [visits, users] = await Promise.all([
          fetch("/api/visits").then(r => r.json()),
          fetch("/api/users").then(r => r.json())
        ]);

        if (visits?.error) {
          showError(visits.error);
          return;
        }

        // Visits table
        if (Array.isArray(visits)) {
          panels.visits.innerHTML = visits.length
            ? `<table><thead><tr>
                <th>Action</th><th>Page</th><th>Durée</th><th>IP</th><th>User</th><th>Date</th>
              </tr></thead><tbody>
              ${visits.map(v => {
                const cls = `badge-${v.action || "enter"}`;
                const dur = v.duration_seconds ? Math.floor(v.duration_seconds) + "s" : "—";
                const date = v.visited_at ? new Date(v.visited_at).toLocaleString("fr-FR") : "—";
                return `<tr>
                  <td><span class="badge ${cls}">${v.action || "page_enter"}</span></td>
                  <td>${v.page_name || v.page || "—"}</td>
                  <td>${dur}</td>
                  <td>${v.ip || "—"}</td>
                  <td>${v.username || "—"}</td>
                  <td>${date}</td>
                </tr>`;
              }).join("")}</tbody></table>`
            : '<div class="empty">Aucune visite</div>';
        } else {
          panels.visits.innerHTML = '<div class="empty">Aucune donnée</div>';
        }

        // Users table
        const userMap = Array.isArray(users) ? {} : users;
        const names = Object.keys(userMap);
        panels.users.innerHTML = names.length
          ? `<table><thead><tr>
              <th>Username</th><th>Créé le</th><th>IP</th><th>User-Agent</th><th>Historique</th>
            </tr></thead><tbody>
            ${names.map(n => {
              const u = userMap[n];
              const date = u.created_at ? new Date(u.created_at).toLocaleString("fr-FR") : "—";
              const history = u.history ? u.history.map(h =>
                `${h.action} ${new Date(h.time).toLocaleString("fr-FR")}`
              ).join("; ") : "—";
              return `<tr>
                <td><strong>${n}</strong></td>
                <td>${date}</td>
                <td>${u.ip || "—"}</td>
                <td title="${u.user_agent || ""}">${u.user_agent ? u.user_agent.slice(0, 40) + "…" : "—"}</td>
                <td>${history}</td>
              </tr>`;
            }).join("")}</tbody></table>`
          : '<div class="empty">Aucun utilisateur</div>';
      } catch (e) {
        showError("Impossible de charger les données — es-tu connecté ?");
      }
    }

    load();
  </script>
</body>
</html>
